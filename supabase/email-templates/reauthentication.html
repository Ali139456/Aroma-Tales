<!--
  Authentication → Email Templates → "Reauthentication"
  Subject: Your verification code · Aroma Tales
  Paste body only: from <!DOCTYPE through </html> (skip this comment).
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify it&rsquo;s you</title>
</head>
<body style="margin:0;padding:0;background-color:#ececec;-webkit-text-size-adjust:100%;">
  <div style="display:none;font-size:1px;color:#ececec;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;">
    Your Aroma Tales verification code is inside this email.
  </div>
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color:#ececec;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:40px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:560px;border-collapse:collapse;background-color:#ffffff;border-radius:20px;overflow:hidden;box-shadow:0 16px 48px rgba(18,18,18,0.12);">
          <tr>
            <td style="background-color:#121212;padding:32px 28px;text-align:center;">
              <p style="margin:0 0 14px;color:#B8860B;font-size:10px;letter-spacing:0.42em;text-transform:uppercase;font-weight:700;">Aroma Tales</p>
              <h1 style="margin:0;color:#ffffff;font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:400;line-height:1.25;">Verify it&rsquo;s you</h1>
            </td>
          </tr>
          <tr>
            <td style="height:4px;background-color:#B8860B;line-height:4px;font-size:0;">&nbsp;</td>
          </tr>
          <tr>
            <td style="padding:36px 32px 36px;text-align:center;">
              <p style="margin:0 0 20px;color:#3d3d3d;font-size:15px;line-height:1.65;">
                Enter this code where prompted. It expires soon.
              </p>
              <p style="margin:0;padding:20px 28px;background-color:#f6f6f6;border-radius:12px;font-family:Consolas,'Courier New',monospace;font-size:32px;font-weight:700;letter-spacing:0.25em;color:#121212;">
                {{ .Token }}
              </p>
              <p style="margin:24px 0 0;color:#b0b0b0;font-size:11px;line-height:1.55;">
                Account: <strong style="color:#3d3d3d;">{{ .Email }}</strong>
              </p>
            </td>
          </tr>
        </table>
        <p style="margin:28px 0 0;color:#9a9a9a;font-size:11px;text-align:center;">
          &copy; Aroma Tales &middot; <a href="{{ .SiteURL }}" style="color:#B8860B;text-decoration:none;font-weight:600;">Visit boutique</a>
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
